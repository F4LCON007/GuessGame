<!doctype html>
<html>
  <head>
    <title>Guess Game</title>
    <!-- You may change the CSS location based on your file structure-->
    <link rel="stylesheet" href="public/css/guesss-game.css" />
  </head>
  <body>
    <div class="main-container">
      <h2>Guess Game</h2>
      <div style="margin-bottom: 10px">
        Guess a number between 1 - 20, you have 5 chances.
      </div>
      <div class="input">
        <input type="text" id="guess-value" name="guess-value" />
        <button id="guess-btn">Guess!</button>
        <button id="restart-btn">Restart</button>
      </div>
      <hr />
      <div id="attempt-text" style="margin-bottom: 10px">
        Attempt <span id="attempt"></span>/5
      </div>
      <div id="result"></div>
    </div>
    <script>
      let targetValue = 0;
      let attempt = 0;

      const guessInput = document.getElementById("guess-value");
      const guessBtn = document.getElementById("guess-btn");
      const restartBtn = document.getElementById("restart-btn");
      const attemptText = document.getElementById("attempt");
      const result = document.getElementById("result");

      function initializeGame() {
        guessInput.value = "";
        attempt = 0;
        targetValue = 0;

        attemptText.textContent = "0";
        result.textContent = "";

        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
      }

      function restartGame() {
        targetValue = Math.floor(Math.random() * 20) + 1;
        attempt = 0;

        attemptText.textContent = "0";
        result.textContent = "";

        guessInput.value = "";
        guessInput.focus();

        restartBtn.style.display = "none";
        guessBtn.style.display = "inline-block";
      }

      function guessGame() {
        const value = guessInput.value;

        if (value === "" || isNaN(value)) {
          return;
        }

        const guess = Number(value);

        attempt++;
        attemptText.textContent = attempt;

        if (guess > targetValue) {
          result.textContent = guess + " is too high";
        } else if (guess < targetValue) {
          result.textContent = guess + " is too low";
        } else {
          result.textContent = "You WIN";
          guessBtn.style.display = "none";
          restartBtn.style.display = "inline-block";
        }

        if (attempt >= 5 && guess !== targetValue) {
          result.textContent = "You LOSE";
          guessBtn.style.display = "none";
          restartBtn.style.display = "inline-block";
        }

        guessInput.value = "";
        guessInput.focus();
      }

      restartBtn.addEventListener("click", restartGame);
      guessBtn.addEventListener("click", guessGame);

      initializeGame();
    </script>
  </body>
</html>
